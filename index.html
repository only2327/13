<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Weather Dashboard</title>
  <!-- Link to the external CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <!-- Header Section -->
    <header>
      <h1>🌤️ Weather Dashboard</h1>
      <p>Simple weather data visualization using HTML, CSS, and Chart.js</p>
    </header>

    <!-- Current Stats Cards -->
    <div class="stats-container">
      <div class="stat-card">
        <h3>🌡️ Temperature</h3>
        <p id="current-temp">32°C</p>
      </div>
      <div class="stat-card">
        <h3>💧 Humidity</h3>
        <p id="current-humidity">65%</p>
      </div>
      <div class="stat-card">
        <h3>💨 Wind Speed</h3>
        <p id="current-wind">12 km/h</p>
      </div>
    </div>

    <!-- Charts Section -->
    <div class="charts-wrapper">
      <div class="chart-container">
        <h2>Weekly Temperature</h2>
        <canvas id="weatherChart"></canvas>
      </div>
      
      <div class="chart-container">
        <h2>Weather Conditions</h2>
        <canvas id="conditionChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Include local Chart.js library -->
  <script src="chart.umd.js"></script>
  <!-- Include custom JavaScript logic -->
  <script src="app.js"></script>

</body>
</html>
